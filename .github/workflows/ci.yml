name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.26'
  # Pinned to match the local toolchain so git hooks, `task lint`, and CI all
  # run the identical linter version.
  GOLANGCI_LINT_VERSION: 'v2.12.2'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        include:
          - os: ubuntu-latest
            coverage: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Download dependencies
        run: go mod download
      - name: Run tests
        run: go test -race -timeout 20m ./...
      - name: Run tests with coverage
        if: matrix.coverage
        run: go test -timeout 20m -coverpkg=./... -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage
        if: matrix.coverage
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          fail_ci_if_error: false

  # Differential round-trip against the pinned libopus oracle (FIXED_POINT +
  # DISABLE_FLOAT_API). The cgo harness compiles the vendored libopus sources
  # directly, so only a C compiler is needed (no autotools). This job is the
  # phase 0 gate; it runs on amd64 and arm64. It stays green until the phase 0
  # reftest harness lands (no `refc`-tagged tests yet).
  reftest:
    name: Reftest (libopus oracle)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run differential harness
        env:
          CGO_ENABLED: '1'
        run: go test -tags refc -timeout 20m ./internal/reftest/...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  vet:
    name: Vet
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run go vet
        env:
          GOARCH: ${{ matrix.goarch }}
        run: go vet ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...
